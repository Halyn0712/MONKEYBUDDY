<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Monkey Face</title>
<style>
:root{
  --bg:#fdf6ec; --surface:#ffffff; --surface2:#fbf3e4; --surface3:#f4e7d2;
  --ink:#3a2a1e; --muted:#a08a76; --line:#efe3d2;
  --accent:#a6642b; --accent2:#e8a13a;
  --success:#3fae5a; --warning:#f5a623; --danger:#e2604a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue","PingFang SC","Microsoft YaHei",Arial,sans-serif;
  background:var(--bg); color:var(--ink);
  overflow:hidden; position:fixed; width:100%;
}
#app{height:100%;display:flex;flex-direction:column;}

/* top bar */
.topbar{
  padding:calc(env(safe-area-inset-top,0px) + 16px) 20px 16px;
  display:flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;flex-shrink:0;border-radius:0 0 22px 22px;
}
.topbar .back{
  width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.22);
  display:none;align-items:center;justify-content:center;font-size:20px;cursor:pointer;
}
.topbar.has-back .back{display:flex;}
.topbar .brand{
  width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.92);
  display:flex;align-items:center;justify-content:center;font-size:23px;flex-shrink:0;
  box-shadow:0 4px 12px rgba(58,42,30,.2);
}
.topbar.has-back .brand{display:none;}
.topbar .title{font-size:19px;font-weight:700;flex:1;}
.topbar .sub{font-size:12px;opacity:.85;font-weight:400;margin-top:2px;}

/* scroll area */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 16px 24px;}
.screen{display:none;}
.screen.active{display:block;animation:fade .3s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* cards */
.card{background:var(--surface);border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 6px 20px rgba(166,100,43,.08);}
.card h3{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.hero{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 10px 30px rgba(166,100,43,.28);}
.hero .big{font-size:40px;font-weight:800;line-height:1.1;}
.hero .unit{font-size:16px;font-weight:600;opacity:.9;margin-left:4px;}
.hero .rowstat{display:flex;gap:10px;margin-top:16px;}
.hero .rowstat .st{flex:1;background:rgba(255,255,255,.16);border-radius:12px;padding:10px;text-align:center;}
.hero .rowstat .st b{font-size:20px;display:block;}
.hero .rowstat .st span{font-size:11px;opacity:.85;}

/* buttons */
.btn{display:block;width:100%;padding:16px;border:none;border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;transition:transform .12s,opacity .2s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 8px 22px rgba(166,100,43,.3);}
.btn-ghost{background:var(--surface3);color:var(--ink);}
.btn:disabled{opacity:.45;cursor:not-allowed;}

.navgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px;}
.navtile{background:var(--surface);border-radius:16px;padding:14px 8px;text-align:center;cursor:pointer;box-shadow:0 4px 14px rgba(166,100,43,.06);transition:transform .12s;}
.navtile:active{transform:scale(.95);}
.navtile .ico{font-size:24px;}
.navtile .lb{font-size:12px;margin-top:6px;color:var(--muted);}

/* platform colors (history icons) */
.p-douyin{background:linear-gradient(135deg,#25f4ee,#fe2c55);}
.p-xhs{background:#ff2442;}
.p-weibo{background:#e6162d;}
.p-wechat{background:#07c160;}
.p-bili{background:#fb7299;}
.p-other{background:linear-gradient(135deg,var(--accent),var(--accent2));}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:9px 16px;background:var(--surface3);border:1.5px solid transparent;border-radius:20px;font-size:14px;cursor:pointer;transition:all .15s;}
.chip.selected{border-color:var(--accent);background:rgba(166,100,43,.14);color:var(--accent);font-weight:600;}

/* bars */
.barrow{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px;}
.barrow .nm{width:60px;flex-shrink:0;color:var(--muted);}
.barrow .track{flex:1;height:22px;background:var(--surface3);border-radius:8px;overflow:hidden;}
.barrow .fill{height:100%;border-radius:8px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#fff;font-size:11px;font-weight:600;min-width:24px;transition:width .5s;}
.f-actual{background:linear-gradient(90deg,var(--accent),var(--accent2));}

/* trend */
.trend{display:flex;align-items:flex-end;gap:8px;height:150px;padding-top:10px;}
.trend .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
.trend .colbar{width:70%;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:6px 6px 0 0;min-height:3px;transition:height .5s;}
.trend .colbar.today{background:linear-gradient(180deg,var(--warning),#fbbf24);}
.trend .colv{font-size:10px;color:var(--muted);margin-bottom:4px;}
.trend .coll{font-size:10px;color:var(--muted);margin-top:6px;}

/* history */
.hitem{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
.hitem:last-child{border-bottom:none;}
.hitem .hemoji{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:800;flex-shrink:0;}
.hitem .hinfo{flex:1;min-width:0;}
.hitem .hinfo .h1{font-size:14px;font-weight:600;}
.hitem .hinfo .h2{font-size:12px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hitem .hright{text-align:right;flex-shrink:0;}
.hitem .hright .ht{font-size:15px;font-weight:700;}
.hitem .hright .hm{font-size:16px;}
.hitem.resist .hemoji{background:linear-gradient(135deg,var(--success),#16a34a);}

.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty .e{font-size:44px;margin-bottom:10px;}
.empty .t{font-size:14px;}

.report-verdict{background:linear-gradient(135deg,rgba(166,100,43,.1),rgba(232,161,58,.1));border-radius:14px;padding:16px;font-size:14px;line-height:1.6;color:var(--ink);}
.report-verdict b{color:var(--accent);}
.mini-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.mini-stats .ms{background:var(--surface2);border-radius:12px;padding:14px;text-align:center;}
.mini-stats .ms b{font-size:24px;display:block;color:var(--accent);}
.mini-stats .ms span{font-size:12px;color:var(--muted);}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;background:var(--surface3);color:var(--muted);margin:3px 4px 0 0;}
.overtime-badge{color:var(--danger);font-weight:700;}
.datepick{display:flex;gap:8px;align-items:center;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;}
.datepick .d{flex-shrink:0;padding:8px 12px;border-radius:12px;background:var(--surface);font-size:12px;text-align:center;cursor:pointer;box-shadow:0 3px 10px rgba(166,100,43,.05);}
.datepick .d.sel{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.datepick .d .dd{font-size:15px;font-weight:700;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar" id="topbar">
    <div class="back" onclick="goHome()">‹</div>
    <div class="brand">🐵</div>
    <div style="flex:1">
      <div class="title" id="tbTitle">Monkey Face</div>
      <div class="sub" id="tbSub"></div>
    </div>
  </div>
  <div class="body" id="body">

    <!-- HOME -->
    <div class="screen active" id="s-home">
      <div class="card hero">
        <div style="font-size:13px;opacity:.9;">今天已经刷了</div>
        <div><span class="big" id="homeMin">0</span><span class="unit">分钟</span></div>
        <div class="rowstat">
          <div class="st"><b id="homeCount">0</b><span>刷屏次数</span></div>
          <div class="st"><b id="homeResist">0</b><span>忍住次数</span></div>
          <div class="st"><b id="homePlanDiff">0</b><span>超计划分钟</span></div>
        </div>
      </div>
      <div class="card" id="monitorCard">
        <h3>🛡️ 自动监控</h3>
        <div id="monitorBody"></div>
      </div>
      <div class="navgrid">
        <div class="navtile" onclick="showReport()"><div class="ico">📊</div><div class="lb">今日报告</div></div>
        <div class="navtile" onclick="showTrend()"><div class="ico">📈</div><div class="lb">本周趋势</div></div>
        <div class="navtile" onclick="showHistory()"><div class="ico">🗂️</div><div class="lb">历史记录</div></div>
        <div class="navtile" onclick="showReasons()"><div class="ico">💬</div><div class="lb">理由统计</div></div>
      </div>
      <div class="card" style="margin-top:14px;">
        <h3>💡 Monkey Face 的小提醒</h3>
        <div style="font-size:13px;color:var(--muted);line-height:1.6;" id="homeTip"></div>
      </div>
    </div>

    <!-- REPORT -->
    <div class="screen" id="s-report">
      <div class="datepick" id="reportDates"></div>
      <div id="reportBody"></div>
    </div>

    <!-- TREND -->
    <div class="screen" id="s-trend">
      <div class="card">
        <h3>📈 最近 7 天刷屏时长</h3>
        <div class="trend" id="trendChart"></div>
      </div>
      <div class="card">
        <h3>📌 本周概览</h3>
        <div class="mini-stats" id="trendStats"></div>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="screen" id="s-history">
      <div class="card">
        <h3>🗂️ 全部记录</h3>
        <div id="historyBody"></div>
      </div>
    </div>

    <!-- REASONS -->
    <div class="screen" id="s-reasons">
      <div id="reasonsBody"></div>
    </div>

  </div>
</div>

<script>
/* ---------- storage ---------- */
var KEY='shuagoumei_sessions_v1';
function nativeSessions(){
  if(!window.Android||!Android.getSessions)return [];
  try{return JSON.parse(Android.getSessions()||'[]')||[];}catch(e){return [];}
}
function load(){
  var local=[];
  try{local=JSON.parse(localStorage.getItem(KEY)||'[]')||[];}catch(e){local=[];}
  // Merge manual (localStorage) + auto (native) records, dedup by id.
  var map={};
  local.concat(nativeSessions()).forEach(function(x){if(x&&x.id!=null)map[x.id]=x;});
  return Object.keys(map).map(function(k){return map[k];});
}
function todayStr(d){d=d||new Date();var m=d.getMonth()+1,day=d.getDate();return d.getFullYear()+'-'+(m<10?'0'+m:m)+'-'+(day<10?'0'+day:day);}
function platClass(p){return {'抖音':'p-douyin','小红书':'p-xhs','微博':'p-weibo','B站':'p-bili','微信':'p-wechat'}[p]||'p-other';}
function platGlyph(p){return {'抖音':'抖','小红书':'书','微博':'博','B站':'B','微信':'信'}[p]||'＋';}

/* ---------- state ---------- */
var stack=['home'];   // screen navigation stack
var reportDate=todayStr();

/* ---------- navigation ---------- */
function showScreen(id,title,sub,back){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('s-'+id).classList.add('active');
  document.getElementById('tbTitle').textContent=title;
  document.getElementById('tbSub').textContent=sub||'';
  document.getElementById('topbar').classList.toggle('has-back',!!back);
  document.getElementById('body').scrollTop=0;
}
function goHome(){
  stack=['home']; renderHome();
  showScreen('home','Monkey Face','今天，你还好吗？',false);
}

/* ---------- home ---------- */
function renderHome(){
  var all=load(), t=todayStr();
  var today=all.filter(function(x){return x.date===t;});
  var browse=today.filter(function(x){return x.type==='browse';});
  var resist=today.filter(function(x){return x.type==='resist';});
  var totalSec=browse.reduce(function(a,x){return a+x.actualSec;},0);
  var totalPlan=browse.reduce(function(a,x){return a+x.plannedMin*60;},0);
  var diffMin=Math.round((totalSec-totalPlan)/60);
  document.getElementById('homeMin').textContent=Math.round(totalSec/60);
  document.getElementById('homeCount').textContent=browse.length;
  document.getElementById('homeResist').textContent=resist.length;
  document.getElementById('homePlanDiff').textContent=(diffMin>0?'+':'')+diffMin;
  var tips=[
    '刷之前先问自己：我是想刷，还是只是习惯性地点开？',
    '每一次“忍住”，都是给未来的自己攒下的时间。',
    '刷完记得如实记录感受——数据不会骗你。',
    '设定时长不是惩罚，是对自己的一个温柔约定。',
    '空虚感往往在放下手机后才出现，提前想想它。'
  ];
  document.getElementById('homeTip').textContent=tips[new Date().getDate()%tips.length];
  renderMonitor();
}

/* ---------- native monitor panel ---------- */
function escHtml(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function naBool(fn){try{return !!(window.Android&&Android[fn]&&Android[fn]());}catch(e){return false;}}
function nativeWhitelist(){
  if(!window.Android||!Android.getWhitelist)return [];
  try{return JSON.parse(Android.getWhitelist()||'[]')||[];}catch(e){return [];}
}
function permRow(name,on,fn){
  return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;">'+
    '<div style="flex:1;font-size:14px;">'+name+'</div>'+
    '<div style="font-size:12px;font-weight:700;color:'+(on?'var(--success)':'var(--muted)')+'">'+(on?'已开启':'未开启')+'</div>'+
    (on?'':'<button class="btn btn-ghost" style="width:auto;margin:0;padding:7px 14px;font-size:13px;" onclick="Android.'+fn+'()">去开启</button>')+
    '</div>';
}
function renderMonitor(){
  var card=document.getElementById('monitorCard');
  if(!window.Android){ card.style.display='none'; return; }  // browser preview: hide
  card.style.display='';
  var acc=naBool('hasAccessibility'), ov=naBool('hasOverlay');
  var wl=nativeWhitelist();
  var html='';
  html+=permRow('感应应用（无障碍）',acc,'openAccessibilitySettings');
  html+=permRow('悬浮窗提醒',ov,'openOverlaySettings');
  html+='<div style="margin-top:12px;">';
  if(wl.length===0){
    html+='<div style="font-size:13px;color:var(--muted);line-height:1.6;">还没有添加应用。加进来后，一打开它们就会自动提醒你先约定时长。</div>';
  }else{
    html+='<div class="chips">'+wl.map(function(a){return '<span class="chip selected" style="cursor:default">'+escHtml(a.label)+'</span>';}).join('')+'</div>';
  }
  html+='</div>';
  html+='<button class="btn btn-primary" style="margin-top:14px;" onclick="Android.openAppPicker()">＋ 管理监控名单</button>';
  if(!acc||!ov){
    html+='<div style="font-size:12px;color:var(--danger);margin-top:10px;line-height:1.6;">⚠️ 权限没开齐，自动监控还不能工作。点上面的「去开启」逐个授权即可。</div>';
  }
  document.getElementById('monitorBody').innerHTML=html;
}
window.__onNativeResume=function(){ try{ renderHome(); }catch(e){} };

/* ---------- report ---------- */
function showReport(){reportDate=todayStr();stack.push('report');renderReport();showScreen('report','每日刷机报告','',true);}
function renderReport(){
  var all=load();
  // date picker: last 7 days
  var dp=document.getElementById('reportDates'); dp.innerHTML='';
  for(var i=6;i>=0;i--){
    var d=new Date(); d.setDate(d.getDate()-i); var ds=todayStr(d);
    var wk=['日','一','二','三','四','五','六'][d.getDay()];
    var el=document.createElement('div');
    el.className='d'+(ds===reportDate?' sel':'');
    el.innerHTML='<div>周'+wk+'</div><div class="dd">'+d.getDate()+'</div>';
    el.onclick=(function(x){return function(){reportDate=x;renderReport();};})(ds);
    dp.appendChild(el);
  }
  var day=all.filter(function(x){return x.date===reportDate;});
  var browse=day.filter(function(x){return x.type==='browse';});
  var resist=day.filter(function(x){return x.type==='resist';});
  var body=document.getElementById('reportBody');
  if(day.length===0){
    body.innerHTML='<div class="card"><div class="empty"><div class="e">🌱</div><div class="t">这一天没有记录。<br>没有记录，也是一种清净。</div></div></div>';
    return;
  }
  var totalSec=browse.reduce(function(a,x){return a+x.actualSec;},0);
  var totalPlan=browse.reduce(function(a,x){return a+x.plannedMin*60;},0);
  var overCount=browse.filter(function(x){return x.actualSec>x.plannedMin*60;}).length;
  // platform breakdown
  var byPlat={};
  browse.forEach(function(x){byPlat[x.platform]=(byPlat[x.platform]||0)+x.actualSec;});
  var platMax=Math.max.apply(null,[1].concat(Object.keys(byPlat).map(function(k){return byPlat[k];})));
  var platHtml='';
  Object.keys(byPlat).forEach(function(k){
    platHtml+='<div class="barrow"><div class="nm">'+k+'</div><div class="track"><div class="fill f-actual" style="width:'+(byPlat[k]/platMax*100)+'%">'+Math.round(byPlat[k]/60)+'分</div></div></div>';
  });
  // mood tags
  var moodHtml=browse.map(function(x){return '<span class="tag">'+x.mood+'</span>';}).join('');
  // verdict
  var diff=Math.round((totalSec-totalPlan)/60);
  var verdict;
  var isToday=(reportDate===todayStr());
  if(browse.length===0){
    verdict='今天你 <b>'+resist.length+'</b> 次点开又忍住了，一分钟都没刷。💪 这是了不起的一天。';
  }else if(diff<=0){
    verdict='这一天刷了 <b>'+Math.round(totalSec/60)+' 分钟</b>，全部都在计划之内'+(resist.length?('，还忍住了 <b>'+resist.length+'</b> 次'):'')+'。节奏掌握得很好。';
  }else if(diff<=15){
    verdict='共刷 <b>'+Math.round(totalSec/60)+' 分钟</b>，比计划多了 <b>'+diff+' 分钟</b>。有 '+overCount+' 次超时'+(resist.length?('，但也忍住了 '+resist.length+' 次'):'')+'。总体还行。';
  }else{
    verdict='共刷 <b>'+Math.round(totalSec/60)+' 分钟</b>，比计划整整多了 <b>'+diff+' 分钟</b>。'+overCount+' 次没能在提醒时停下。明天，给自己更短的约定试试？';
  }
  body.innerHTML=
    '<div class="card"><h3>📊 '+reportDate+' 报告'+(isToday?' · 今天':'')+'</h3>'+
      '<div class="mini-stats">'+
        '<div class="ms"><b>'+Math.round(totalSec/60)+'</b><span>刷屏分钟</span></div>'+
        '<div class="ms"><b>'+browse.length+'</b><span>刷屏次数</span></div>'+
        '<div class="ms"><b>'+resist.length+'</b><span>忍住次数</span></div>'+
        '<div class="ms"><b class="'+(overCount?'overtime-badge':'')+'">'+overCount+'</b><span>超时次数</span></div>'+
      '</div></div>'+
    (platHtml?'<div class="card"><h3>📱 各平台时长</h3>'+platHtml+'</div>':'')+
    (moodHtml?'<div class="card"><h3>🪞 当时的感受</h3>'+moodHtml+'</div>':'')+
    '<div class="card"><h3>📝 今日小结</h3><div class="report-verdict">'+verdict+'</div></div>';
}

/* ---------- trend ---------- */
function showTrend(){stack.push('trend');renderTrend();showScreen('trend','本周趋势','最近 7 天的刷屏时间',true);}
function renderTrend(){
  var all=load(), days=[], vals=[];
  for(var i=6;i>=0;i--){
    var d=new Date(); d.setDate(d.getDate()-i); var ds=todayStr(d);
    var sec=all.filter(function(x){return x.date===ds&&x.type==='browse';}).reduce(function(a,x){return a+x.actualSec;},0);
    days.push({label:['日','一','二','三','四','五','六'][d.getDay()],min:Math.round(sec/60),today:(i===0)});
    vals.push(Math.round(sec/60));
  }
  var mx=Math.max.apply(null,[1].concat(vals));
  var chart=document.getElementById('trendChart'); chart.innerHTML='';
  days.forEach(function(d){
    var col=document.createElement('div'); col.className='col';
    col.innerHTML='<div class="colv">'+d.min+'</div><div class="colbar'+(d.today?' today':'')+'" style="height:'+(d.min/mx*100)+'%"></div><div class="coll">'+d.label+'</div>';
    chart.appendChild(col);
  });
  var total=vals.reduce(function(a,b){return a+b;},0);
  var avg=Math.round(total/7);
  var resistWeek=0;
  for(var j=6;j>=0;j--){var dd=new Date();dd.setDate(dd.getDate()-j);var s2=todayStr(dd);resistWeek+=all.filter(function(x){return x.date===s2&&x.type==='resist';}).length;}
  document.getElementById('trendStats').innerHTML=
    '<div class="ms"><b>'+total+'</b><span>本周总分钟</span></div>'+
    '<div class="ms"><b>'+avg+'</b><span>日均分钟</span></div>'+
    '<div class="ms"><b>'+resistWeek+'</b><span>本周忍住</span></div>'+
    '<div class="ms"><b>'+Math.max.apply(null,vals)+'</b><span>单日最高</span></div>';
}

/* ---------- history ---------- */
function showHistory(){stack.push('history');renderHistory();showScreen('history','历史记录','',true);}
function renderHistory(){
  var all=load().slice().sort(function(a,b){return b.id-a.id;});
  var body=document.getElementById('historyBody');
  if(all.length===0){body.innerHTML='<div class="empty"><div class="e">🗂️</div><div class="t">还没有任何记录，去首页开始吧。</div></div>';return;}
  var html='';
  all.forEach(function(x){
    var isR=x.type==='resist';
    var when=new Date(x.startTime);
    var hh=when.getHours(),mm=when.getMinutes();
    var timeLabel=x.date+' '+(hh<10?'0'+hh:hh)+':'+(mm<10?'0'+mm:mm);
    var right=isR?'忍住':(Math.round(x.actualSec/60)+'分');
    var over=(!isR&&x.actualSec>x.plannedMin*60);
    html+='<div class="hitem'+(isR?' resist':'')+'">'+
      '<div class="hemoji '+platClass(x.platform)+'">'+(isR?'✓':platGlyph(x.platform))+'</div>'+
      '<div class="hinfo"><div class="h1">'+x.platform+(isR?' · 忍住了':'')+'</div>'+
        '<div class="h2">'+timeLabel+' · '+(x.reason||'-')+'</div></div>'+
      '<div class="hright"><div class="ht'+(over?' overtime-badge':'')+'">'+right+'</div><div class="hm">'+(x.mood?x.mood.split(' ')[0]:'')+'</div></div>'+
    '</div>';
  });
  body.innerHTML=html;
}

/* ---------- reasons ---------- */
var REASON_CATS=[
  {key:'relax',emoji:'😌',label:'放松 / 解压',kw:['放松','解压','休息','放空','歇','轻松','缓一缓','喘口气','解闷','舒缓']},
  {key:'bored',emoji:'🥱',label:'无聊 / 打发时间',kw:['无聊','打发','没事','闲','消磨','等','排队','蹲','厕所','杀时间','空闲']},
  {key:'habit',emoji:'🔁',label:'习惯 / 手痒',kw:['习惯','手痒','顺手','下意识','忍不住','手贱','惯性','刷惯','点开','控制不住']},
  {key:'mood',emoji:'😮‍💨',label:'情绪 / 焦虑',kw:['焦虑','烦','压力','心情','难受','逃避','emo','郁闷','孤独','空虚','失落','委屈','生气']},
  {key:'work',emoji:'📚',label:'正事 / 找资料',kw:['资料','学习','工作','查','搜','找','消息','回复','联系','课','作业','看看有没有']},
  {key:'sleep',emoji:'🌙',label:'睡前 / 失眠',kw:['睡前','失眠','睡不着','躺','床','熬夜','半夜','困']},
  {key:'fun',emoji:'🎬',label:'娱乐 / 追更',kw:['好看','视频','剧','追','八卦','热搜','游戏','有趣','搞笑','好玩','更新','直播']}
];
function reasonCategory(text){
  var s=(text||'').toLowerCase();
  for(var i=0;i<REASON_CATS.length;i++){
    for(var j=0;j<REASON_CATS[i].kw.length;j++){
      if(s.indexOf(REASON_CATS[i].kw[j])>-1)return REASON_CATS[i];
    }
  }
  return {key:'other',emoji:'💬',label:'其他',kw:[]};
}
function showReasons(){stack.push('reasons');renderReasons();showScreen('reasons','理由统计','你每次刷之前，都是为了什么？',true);}
function renderReasons(){
  var body=document.getElementById('reasonsBody');
  var withReason=load().filter(function(x){
    return x && x.reason && String(x.reason).trim().length>0 && x.reason!=='临时点开';
  });
  if(withReason.length===0){
    body.innerHTML='<div class="card"><div class="empty"><div class="e">💬</div>'+
      '<div class="t">还没有写过理由。<br>下次刷之前填一句「为什么」，这里就会帮你统计。</div></div></div>';
    return;
  }
  // category tally (with browse vs resist split)
  var cats={},total=withReason.length,resistTotal=0;
  withReason.forEach(function(x){
    var c=reasonCategory(x.reason);
    if(!cats[c.key])cats[c.key]={emoji:c.emoji,label:c.label,count:0,resist:0};
    cats[c.key].count++;
    if(x.type==='resist'){cats[c.key].resist++;resistTotal++;}
  });
  var catArr=Object.keys(cats).map(function(k){return cats[k];})
    .sort(function(a,b){return b.count-a.count;});
  var top=catArr[0];
  // category bars
  var catHtml='';
  catArr.forEach(function(c){
    var pct=Math.round(c.count/total*100);
    catHtml+='<div style="margin-bottom:14px;">'+
      '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;">'+
        '<span>'+c.emoji+' '+c.label+'</span>'+
        '<span style="color:var(--muted)">'+c.count+' 次 · '+pct+'%'+(c.resist?'（忍住 '+c.resist+'）':'')+'</span>'+
      '</div>'+
      '<div class="track" style="height:14px;"><div class="fill f-actual" style="width:'+Math.max(pct,4)+'%;min-width:0;padding:0;"></div></div>'+
    '</div>';
  });
  // exact-phrase frequency
  var phrases={};
  withReason.forEach(function(x){
    var p=String(x.reason).trim();
    phrases[p]=(phrases[p]||0)+1;
  });
  var phraseArr=Object.keys(phrases).map(function(k){return {text:k,n:phrases[k]};})
    .sort(function(a,b){return b.n-a.n;});
  var phraseHtml='';
  phraseArr.slice(0,12).forEach(function(p){
    phraseHtml+='<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px;">'+
      '<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escHtml(p.text)+'</span>'+
      '<span style="color:var(--accent);font-weight:700;margin-left:12px;flex-shrink:0;">×'+p.n+'</span>'+
    '</div>';
  });
  body.innerHTML=
    '<div class="card"><h3>💬 理由概览</h3>'+
      '<div class="mini-stats">'+
        '<div class="ms"><b>'+total+'</b><span>写下理由的次数</span></div>'+
        '<div class="ms"><b>'+phraseArr.length+'</b><span>不同的说法</span></div>'+
        '<div class="ms"><b>'+catArr.length+'</b><span>理由类型</span></div>'+
        '<div class="ms"><b>'+resistTotal+'</b><span>其中忍住</span></div>'+
      '</div>'+
      '<div class="report-verdict" style="margin-top:14px;">你最常见的理由是 <b>'+top.emoji+' '+top.label+'</b>，'+
        '出现了 <b>'+top.count+'</b> 次。'+(top.key==='bored'||top.key==='habit'?'下次点开前，也许可以先问问自己：真的需要现在刷吗？':'认清自己的动机，是管住手的第一步。')+'</div>'+
    '</div>'+
    '<div class="card"><h3>🏷️ 理由类型分布</h3>'+catHtml+'</div>'+
    '<div class="card"><h3>📝 你写下的原话</h3>'+phraseHtml+'</div>';
}

/* ---------- android back ---------- */
window.__handleBack=function(){
  var top=stack[stack.length-1];
  if(top==='report'||top==='trend'||top==='history'||top==='reasons'){goHome();return true;}
  return false; // on home -> let android exit
};

/* ---------- boot ---------- */
renderHome();
showScreen('home','Monkey Face','今天，你还好吗？',false);
</script>
</body>
